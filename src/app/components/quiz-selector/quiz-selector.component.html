<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Selecciona un Test</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p>Elige uno de tus resultados para contextualizar el chat con la IA.</p>
  
  <ion-list>
    <ion-item *ngFor="let quiz of quizzes" [button]="quiz.is_paid" (click)="quiz.is_paid && selectQuiz(quiz)" [detail]="quiz.is_paid">
      <ion-icon slot="start" [name]="quiz.is_paid ? 'chatbubbles-outline' : 'lock-closed-outline'" [color]="quiz.is_paid ? 'primary' : 'medium'"></ion-icon>
      <ion-label>
        <h2>{{ quiz.resultTypeName }}</h2>
        <p>{{ quiz.date | date:'dd/MM/yyyy HH:mm' }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <div class="premium-prompt" *ngIf="hasUnpaidQuizzes">
    <ion-card color="light">
      <ion-card-content class="ion-text-center">
        <p>Algunos de tus resultados requieren un <strong>Informe Completo</strong> desbloqueado para usar el chat con IA.</p>
        <ion-button expand="block" (click)="goToPremium()">
          <ion-icon slot="start" name="sparkles-outline"></ion-icon>
          Hazte Premium
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
